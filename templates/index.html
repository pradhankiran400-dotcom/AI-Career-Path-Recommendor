<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Career Path Recommendor</title>
    <link rel="stylesheet" href="/static/CSS/style.css">
</head>
<body>
    <div class="navbar">
        <nav>
            <ul>
                <li class="nav-item">AI Career Path Recommendor</li>
                <li id="home"><a href="/">🏠 Home</a></li>
            </ul>
        </nav>
    </div>
    
    <div class="container">
        <h1>🤖 AI Career Path Recommendor</h1>
        <p class="subtitle">Bridge the gap between your current skills and your dream job.</p>
        
        <form action="/analyze" method="post" enctype="multipart/form-data" class="form-card">
            
            <div class="form-group">
                <label>1. Select Your Target Dream Job:</label>
                <select name="target_job" required class="form-input">
                    {% for job in jobs %}
                    <option value="{{ job }}">{{ job }}</option>
                    {% endfor %}
                </select>
            </div>

            <hr class="divider">

            <div class="form-group">
                <label>2. Option A: Upload your Resume (PDF format):</label>
                <input type="file" name="resume_file" accept=".pdf" class="form-input-file">
            </div>

            <div class="or-badge">OR</div>

            <div class="form-group">
                <label>3. Option B: Enter Your Current Skills:</label>
                <input type="text" name="typed_skills" class="form-input" placeholder="Type skills separated by commas (e.g. Python, SQL)">
                
                <p style="margin: 10px 0 5px 0; font-size: 14px; color: #4b5563;">Or select multiple from the list below:</p>
                <select name="manual_skills" multiple class="form-input-select">
                    {% for skill in all_skills %}
                    <option value="{{ skill }}">{{ skill }}</option>
                    {% endfor %}
                </select>
            </div>

            <button type="submit" class="submit-btn">Generate My Path 🚀</button>
        </form>
    </div>
</body>
</html>
